<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI App Builder Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0c0d10;
    color:white;
    font-family:'Syne',sans-serif;
    min-height:100vh;
}

.navbar{
    background:#13151a;
    border-bottom:1px solid #2a2f3d;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#7c6dfa;
}

.logout-btn{
    background:#ff4d6d;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-family:'Syne',sans-serif;
}

.container{
    padding:40px;
}

.welcome-card{
    background:#13151a;
    border:1px solid #2a2f3d;
    border-radius:16px;
    padding:30px;
    margin-bottom:30px;
}

.welcome-card h1{
    margin-bottom:10px;
}

.welcome-card p{
    color:#b4b7c4;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:#13151a;
    border:1px solid #2a2f3d;
    border-radius:16px;
    padding:25px;
}

.stat-number{
    font-size:36px;
    font-weight:700;
    color:#7c6dfa;
    margin-bottom:10px;
}

.projects-card{
    background:#13151a;
    border:1px solid #2a2f3d;
    border-radius:16px;
    padding:30px;
}

.projects-card h2{
    margin-bottom:20px;
}

.project-item{
    background:#1a1d24;
    border:1px solid #343b4f;
    border-radius:12px;
    padding:16px;
    margin-bottom:12px;
}

.project-title{
    font-weight:600;
    margin-bottom:5px;
}

.project-desc{
    color:#a6aab8;
    font-size:14px;
}

.actions{
    margin-top:25px;
}

.primary-btn{
    background:#7c6dfa;
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:10px;
    cursor:pointer;
    font-family:'Syne',sans-serif;
    font-size:15px;
    margin-right:10px;
}

.primary-btn:hover{
    opacity:0.9;
}

.empty{
    color:#9ca3af;
    padding:20px;
    text-align:center;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">
        AI App Builder
    </div>

    <button class="logout-btn"
        onclick="window.location='/'">
        Logout
    </button>
</div>

<div class="container">

    <div class="welcome-card">
        <h1>Welcome 👋</h1>
        <p>
            Manage your AI-generated applications and continue building new projects.
        </p>
    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <div class="stat-number">0</div>
            <div>Total Projects</div>
        </div>

        <div class="stat-card">
            <div class="stat-number">0</div>
            <div>Downloads</div>
        </div>

        <div class="stat-card">
            <div class="stat-number">5</div>
            <div>AI Agents</div>
        </div>

    </div>

    <div class="projects-card">

        <h2>Your Projects</h2>

        <div id="projectList">

            <div class="empty">
                No projects created yet.
            </div>

        </div>

        <div class="actions">

            <button class="primary-btn"
                onclick="window.location='/builder'">
                🚀 Create New App
            </button>

        </div>

    </div>

</div>

<script>

async function loadProjects(){

    try{

        const res = await fetch('/projects');
        const projects = await res.json();

        const container =
            document.getElementById('projectList');

        if(projects.length === 0){
            return;
        }

        container.innerHTML = '';

        projects.forEach(project => {

            container.innerHTML += `
                <div class="project-item">
                    <div class="project-title">
                        ${project.id}
                    </div>

                    <div class="project-desc">
                        Created: ${project.created}
                    </div>
                </div>
            `;
        });

    }catch(error){
        console.error(error);
    }
}

loadProjects();

</script>

</body>
</html>
