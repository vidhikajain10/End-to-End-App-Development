<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - AI App Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0c0d10;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Syne',sans-serif;
    color:white;
}

.card{
    width:450px;
    background:#13151a;
    border:1px solid #2a2f3d;
    border-radius:16px;
    padding:40px;
}

.logo{
    text-align:center;
    font-size:30px;
    font-weight:700;
    color:#7c6dfa;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#a8acb9;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#c7cad4;
}

input{
    width:100%;
    padding:14px;
    background:#1a1d24;
    border:1px solid #343b4f;
    border-radius:10px;
    color:white;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#7c6dfa;
}

button{
    width:100%;
    padding:14px;
    background:#7c6dfa;
    border:none;
    border-radius:10px;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

.message{
    margin-top:15px;
    text-align:center;
    color:#ff8a8a;
}

.footer{
    text-align:center;
    margin-top:20px;
}

.footer a{
    color:#7c6dfa;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">AI App Builder</div>

    <div class="subtitle">
        Create your account
    </div>

    <div class="input-group">
        <label>Username</label>
        <input id="username" type="text" placeholder="Enter username">
    </div>

    <div class="input-group">
        <label>Email</label>
        <input id="email" type="email" placeholder="Enter email">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter password">
    </div>

    <button onclick="registerUser()">
        Create Account
    </button>

    <div id="message" class="message"></div>

    <div class="footer">
        Already have an account?
        <a href="/">Login</a>
    </div>

</div>

<script>

async function registerUser(){

    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const message = document.getElementById("message");

    message.innerHTML = "";

    if(!username || !email || !password){
        message.innerHTML = "Please fill all fields";
        return;
    }

    try{

        const res = await fetch("/register",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username,
                email,
                password
            })
        });

        const data = await res.json();

        if(data.success){

            message.style.color = "#4ade80";
            message.innerHTML = "Account created successfully!";

            setTimeout(()=>{
                window.location.href="/dashboard";
            },1000);

        }else{

            message.style.color = "#ff8a8a";
            message.innerHTML = data.message || "Registration failed";
        }

    }catch(err){

        console.error(err);

        message.style.color = "#ff8a8a";
        message.innerHTML = "Server error";
    }
}

</script>

</body>
</html>
